<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>howisYOURday..</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --accent-color: #000000;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 350px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            font-weight: 500;
        }

        h2 {
            font-size: 0.7rem;
            margin-bottom: 4px;
            font-weight: 300;
            color: #b34805;
            font-weight: bold;
        }

        h3 {
            font-size: 0.7rem;
            margin-bottom: 24px;
            font-weight: 300;
            color: #b34805;
        }

        input[type="number"] {
            width: 140px;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        button {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        #message {
            margin-top: 15px;
            font-size: 0.95rem;
            min-height: 20px;
            line-height: 1.4;
        }

        /* Completely hidden container for the YouTube player */
        #yt-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="yt-player"></div>

    <div class="card">
        <h1>how's your day?..kev</h1>
        <input type="number" id="scoreInput" min="0" max="10" step="0.5" placeholder="fill here /10">
        <button onclick="submitScore()">tell mee, press</button>
        <div id="message"></div>
        <h2>updated ver1.25.63</h2>
        <h3>desc: bg music is available aft submitting the score! ..pls listen krush<h3>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby6BDsvg_lUOc2Wf5faHrDOcx_ae81uU0NzxYSI_TtSqOqaV_l3egn76c83TmQQG3d15A/exec";
        
        let player;
        
        // 🛠️ CONFIG: Change this to ANY YouTube Video ID you want!
        // This ID (dQw4w9WgXcQ) is just a placeholder example.
        const YOUTUBE_VIDEO_ID = "5Czc5H9Ss-g"; 

        // Automatically called by the YouTube API script when ready
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: YOUTUBE_VIDEO_ID,
                playerVars: {
                    'autoplay': 0,      // Don't play immediately (browsers block it)
                    'controls': 0,      // Hide video timeline/buttons
                    'disablekb': 1,    // Disable keyboard shortcuts
                    'fs': 0,           // Disable full screen button
                    'loop': 1,         // Loop the song when it finishes
                    'playlist': YOUTUBE_VIDEO_ID // Required setup for looping to work
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Set background volume (0 = silent, 100 = full blast). 40 is nice and subtle.
            event.target.setVolume(40); 
        }

        async function submitScore() {
            const input = document.getElementById('scoreInput');
            const messageDiv = document.getElementById('message');
            const score = parseFloat(input.value);

            if (isNaN(score) || score < 0 || score > 10) {
                messageDiv.style.color = '#dc3545';
                messageDiv.innerText = "Please enter a number between 0 and 10.";
                return;
            }

            // 🎵 Trigger the background music right on user click
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }

            messageDiv.style.color = '#6c757d';
            messageDiv.innerText = "Sending...";

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ score: score })
                });

                let successMessage = "";
                if (score === 10) {
                    successMessage = "told you, you're 10/10 (in my eyes hah ha";
                } else if (score >= 7) {
                    successMessage = "very nice, good jobu!";
                } else if (score > 5) {
                    successMessage = "seee..not bad lah, at least it's over 5 na";
                } else {
                    successMessage = "tell me anytime okma OR maybe good food helps?";
                }

                messageDiv.style.color = '#198754';
                messageDiv.innerText = successMessage;
                input.value = ''; 
            } 
            catch (error) {
                console.error(error);
                messageDiv.style.color = '#dc3545';
                messageDiv.innerText = "Failed to save. Try again.";
            }
        }
    </script>
</body>
</html>
